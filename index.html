<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classmate System</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>
</head>

<body>

    <header>
        <h1>10 Sapphire Classmate System</h1>
    </header>

    <main>

        <section class="form-card">
            <h2>Add a Classmate</h2>

            <div class="form-grid">

                <div class="field">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="Enter Name">
                </div>

                <div class="field">
                    <label>Section</label>
                    <input type="text" id="section" placeholder="Enter Section">
                </div>

                <div class="field">
                    <label>Favorite Subject</label>
                    <input type="text" id="subject" placeholder="Enter Favorite Subject">
                </div>

            </div>

            <br>

            <button py-click="add_classmate">
                Add Classmate
            </button>

            <button py-click="show_list">
                Show All
            </button>

        </section>

        <section class="output-card">
            <h2>Classmate List</h2>
            <div id="output"></div>
        </section>

    </main>

    <py-script src="main.py"></py-script>

</body>
</html>
